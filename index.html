<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京五日遊｜行程規劃 & 團員投票</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
        }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .voted { background-color: #16a34a !important; color: white !important; cursor: default; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- 前面所有 HTML 內容保持不變（從 <nav> 到 <section> 投票區之前都一樣） -->
    <!-- 為了簡潔，我這裡只顯示需要替換的投票相關部分與 script -->
    <!-- 請把你原本的整個 <script> ... </script> 替換成下面的新 script -->

    <script>
        let activities = [
            { id: 1, name: "東京哈利波特製片廠之旅門票", desc: "華納兄弟哈利波特影城（練馬區）｜豐島園站步行3分鐘，體驗電影魔法世界！", type: "proposed", votes: 0 },
            { id: 2, name: "Spadium Japon（スパジアムジャポン）", desc: "東京都東久留米市｜關東最大級名水天然溫泉＆岩盤浴，一天都能放鬆泡湯+美食", type: "proposed", votes: 0 },
            { id: 3, name: "東京迪士尼樂園 / 海洋", desc: "千葉浦安市｜從柏之葉搭電車約50分鐘，夢幻樂園全天玩樂", type: "recommend", votes: 0 },
            { id: 4, name: "淺草寺 & 東京晴空塔", desc: "傳統寺廟 + 現代高塔｜老街小吃 + 登塔眺望東京全景", type: "recommend", votes: 0 },
            { id: 5, name: "澀谷 & 原宿潮流區", desc: "澀谷十字路口 + 竹下通 + 明治神宮｜年輕東京購物美食一日", type: "recommend", votes: 0 },
            { id: 6, name: "秋葉原電器街", desc: "動漫、電玩、女僕咖啡廳天堂｜伴手禮購物超方便", type: "recommend", votes: 0 }
        ];

        // 讀取投票與已投票紀錄
        function loadData() {
            const savedVotes = localStorage.getItem('tokyoTripVotes');
            const savedVoted = localStorage.getItem('tokyoTripVotedItems');

            if (savedVotes) {
                const parsedVotes = JSON.parse(savedVotes);
                activities.forEach(activity => {
                    if (parsedVotes[activity.id] !== undefined) activity.votes = parsedVotes[activity.id];
                });
            }

            window.votedItems = savedVoted ? JSON.parse(savedVoted) : [];
        }

        // 儲存投票與已投票紀錄
        function saveData() {
            const voteData = {};
            activities.forEach(a => voteData[a.id] = a.votes);
            localStorage.setItem('tokyoTripVotes', JSON.stringify(voteData));
            localStorage.setItem('tokyoTripVotedItems', JSON.stringify(window.votedItems || []));
            updateTotalVotes();
        }

        function updateTotalVotes() {
            const total = activities.reduce((sum, a) => sum + a.votes, 0);
            const el = document.getElementById('total-votes');
            if (el) el.textContent = total;
        }

        // 投票函數（限制每人每項目只能投一次）
        function vote(id) {
            if (window.votedItems.includes(id)) {
                alert("你已經投過這個活動了！\n每個人每個項目只能投 1 票喔～");
                return;
            }

            const activity = activities.find(a => a.id === id);
            if (activity) {
                activity.votes++;
                window.votedItems.push(id);
                saveData();
                renderAllCards();
                
                // 成功投票提示
                const name = activity.name.length > 20 ? activity.name.substring(0, 20) + "..." : activity.name;
                alert(`✅ 投票成功！\n你已為「${name}」投下 1 票`);
            }
        }

        // 重置所有投票（包含已投票紀錄）
        function clearVotes() {
            if (confirm('確定要重置所有投票紀錄嗎？（包含你自己已投過的狀態）')) {
                activities.forEach(a => a.votes = 0);
                window.votedItems = [];
                localStorage.removeItem('tokyoTripVotes');
                localStorage.removeItem('tokyoTripVotedItems');
                renderAllCards();
            }
        }

        // 渲染函數（加上已投票樣式）
        function renderProposedCards() { /* ... 保持原本內容，但 button 加上判斷 */ 
            const container = document.getElementById('proposed-cards');
            container.innerHTML = '';
            const proposed = activities.filter(a => a.type === 'proposed');
            
            proposed.forEach(activity => {
                const isVoted = window.votedItems.includes(activity.id);
                const buttonHTML = isVoted 
                    ? `<button class="voted flex items-center gap-2 px-8 py-4 rounded-3xl font-semibold w-full justify-center">✅ 已投票</button>`
                    : `<button onclick="vote(${activity.id});" class="flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white px-8 py-4 rounded-3xl font-semibold transition-colors w-full justify-center"><span class="text-2xl">👍</span><span>我要投票</span></button>`;
                
                const cardHTML = `
                <div class="bg-white rounded-3xl shadow overflow-hidden card-hover">
                    <div class="px-8 pt-8 pb-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="inline-block px-4 py-1 text-xs font-medium bg-yellow-100 text-yellow-700 rounded-3xl">團員提議</span>
                                <h3 class="text-2xl font-bold mt-3 leading-tight">${activity.name}</h3>
                                <p class="text-gray-600 mt-4">${activity.desc}</p>
                            </div>
                            <div class="vote-badge bg-red-500 text-white text-xl font-bold w-12 h-12 rounded-2xl flex items-center justify-center shadow-inner">
                                ${activity.votes}
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-8 py-5">${buttonHTML}</div>
                </div>`;
                container.innerHTML += cardHTML;
            });
        }

        function renderRecommendCards() {
            const container = document.getElementById('recommend-cards');
            container.innerHTML = '';
            const recommends = activities.filter(a => a.type === 'recommend');
            
            recommends.forEach(activity => {
                const isVoted = window.votedItems.includes(activity.id);
                const voteHTML = isVoted 
                    ? `<div class="voted text-sm font-medium px-6 py-3 rounded-3xl inline-flex items-center">✅ 已投票</div>`
                    : `<div onclick="vote(${activity.id});" class="cursor-pointer bg-red-500 hover:bg-red-600 text-white text-3xl font-bold w-14 h-14 rounded-3xl flex items-center justify-center shadow-inner transition-all active:scale-95">${activity.votes}</div>`;
                
                const cardHTML = `
                <div class="bg-white rounded-3xl shadow p-8 card-hover flex flex-col">
                    <div class="flex-1">
                        <h3 class="text-xl font-bold">${activity.name}</h3>
                        <p class="text-gray-600 mt-4">${activity.desc}</p>
                    </div>
                    <div class="mt-8 flex justify-between items-end">
                        <div class="text-sm font-medium text-gray-400">推薦</div>
                        ${voteHTML}
                    </div>
                </div>`;
                container.innerHTML += cardHTML;
            });
        }

        function renderVoteArea() {
            const container = document.getElementById('vote-area');
            container.innerHTML = '';
            
            activities.forEach(activity => {
                const isVoted = window.votedItems.includes(activity.id);
                const label = activity.type === 'proposed' 
                    ? `<span class="px-3 py-0.5 text-xs bg-yellow-100 text-yellow-700 rounded-3xl">團員提議</span>` 
                    : `<span class="px-3 py-0.5 text-xs bg-blue-100 text-blue-700 rounded-3xl">推薦</span>`;
                
                const buttonHTML = isVoted 
                    ? `<button class="mt-6 w-full py-4 bg-green-500 text-white font-semibold rounded-3xl flex items-center justify-center gap-3 cursor-default">✅ 你已經投過這個活動</button>`
                    : `<button onclick="vote(${activity.id});" class="mt-6 w-full py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-3xl flex items-center justify-center gap-3 transition-colors"><span class="text-3xl">👍</span> 投我一票！</button>`;
                
                const cardHTML = `
                <div class="bg-white/90 text-gray-900 rounded-3xl shadow p-6 flex flex-col">
                    <div class="flex justify-between mb-4">
                        ${label}
                        <div class="text-4xl font-bold text-red-500">${activity.votes}</div>
                    </div>
                    <h3 class="text-xl font-bold leading-tight">${activity.name}</h3>
                    <p class="text-gray-600 mt-4 flex-1">${activity.desc}</p>
                    ${buttonHTML}
                </div>`;
                container.innerHTML += cardHTML;
            });
        }

        function renderAllCards() {
            renderProposedCards();
            renderRecommendCards();
            renderVoteArea();
            updateTotalVotes();
        }

        // 初始化
        window.onload = function() {
            loadData();
            renderAllCards();
            console.log('%c✅ 東京五日遊網頁已更新！現在每個項目每人只能投 1 次', 'color: #16a34a; font-size: 14px; font-weight: bold');
        };
    </script>
</body>
</html>
